<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PaperSprint</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css?v=47" />
  </head>
  <body class="reader-body">
    <header class="topbar">
      <div class="brand">
        <div>
          <strong>PaperSprint</strong>
          <span id="provider-status">Loading</span>
        </div>
      </div>

      <form id="upload-form" class="upload-form">
        <div id="pdf-zoom-controls" class="pdf-controls hidden" role="toolbar" aria-label="PDF zoom">
          <button id="pdf-zoom-out-button" class="icon-button" title="Zoom out" type="button" aria-label="Zoom out">-</button>
          <span id="pdf-zoom-label" class="pdf-zoom-label">100%</span>
          <button id="pdf-zoom-in-button" class="icon-button" title="Zoom in" type="button" aria-label="Zoom in">+</button>
        </div>
        <select id="provider-select" aria-label="AI provider">
          <option value="auto">Auto</option>
          <option value="codex">Codex subscription</option>
          <option value="openai">OpenAI API key</option>
        </select>
        <input id="text-model-input" class="model-input" type="text" aria-label="Text model" spellcheck="false" />
        <select id="text-effort-select" class="effort-select" aria-label="Text reasoning effort"></select>
        <input id="vision-model-input" class="model-input" type="text" aria-label="Vision model" spellcheck="false" />
        <select id="vision-effort-select" class="effort-select" aria-label="Vision reasoning effort"></select>
        <input
          id="api-key-input"
          class="api-key-input hidden"
          type="password"
          autocomplete="off"
          spellcheck="false"
          placeholder="OpenAI API key"
          aria-label="OpenAI API key"
        />
        <label class="file-picker">
          <input id="pdf-input" type="file" accept="application/pdf,.pdf" multiple />
          <span>Choose PDFs</span>
        </label>
        <button id="analyze-button" class="loading-button" type="submit">
          <span class="button-spinner" aria-hidden="true"></span>
          <span class="button-label">Analyze</span>
        </button>
        <button id="figures-button" type="button" disabled>Figures</button>
        <button id="theme-toggle" class="icon-button" title="Toggle dark mode" type="button" aria-label="Toggle dark mode">
          ☾
        </button>
      </form>
    </header>

    <main class="workspace">
      <aside class="library-panel">
        <div class="panel-header">
          <h2>Papers</h2>
          <button id="refresh-button" class="icon-button" title="Refresh papers" type="button">↻</button>
        </div>
        <div id="paper-list" class="paper-list"></div>

        <section class="highlights-section">
          <div class="panel-header">
            <h2>Highlights</h2>
            <span id="highlight-count">0</span>
          </div>
          <div id="highlight-filters" class="highlight-filters"></div>
          <div id="highlight-list" class="highlight-list"></div>
        </section>
      </aside>

      <section class="reader-panel">
        <div id="reader-empty" class="empty-state">
          <strong>No paper selected</strong>
          <span>Choose a PDF to load it.</span>
        </div>
        <div id="pdf-viewer" class="pdf-viewer hidden"></div>
      </section>

      <aside class="assistant-panel">
        <section class="summary-panel">
          <div class="paper-heading">
            <span id="paper-provider" class="provider-pill">Idle</span>
            <h1 id="paper-title">PaperSprint</h1>
          </div>
          <p id="paper-overview"></p>

          <div id="background-section" class="summary-subsection hidden">
            <h2 class="summary-section-title">Background</h2>
            <div id="background-notes" class="tab-panel"></div>
          </div>

          <h2 class="summary-section-title">Takeaways</h2>
          <div id="takeaways-tab" class="tab-panel takeaways-panel"></div>
          <div
            id="takeaways-resize-handle"
            class="takeaways-resize-handle"
            role="separator"
            aria-orientation="horizontal"
            aria-label="Resize takeaways"
            tabindex="0"
          ></div>
        </section>

        <div
          id="chat-resize-handle"
          class="chat-resize-handle"
          role="separator"
          aria-orientation="horizontal"
          aria-label="Resize chat panel"
          tabindex="0"
        ></div>

        <section class="chat-panel">
          <div class="chat-header">
            <h2>Chat</h2>
            <label class="toggle">
              <input id="web-toggle" type="checkbox" checked />
              <span>Web</span>
            </label>
          </div>
          <div id="chat-messages" class="chat-messages"></div>
          <form id="chat-form" class="chat-form">
            <textarea id="chat-input" rows="1" placeholder="Ask about this paper"></textarea>
            <button type="submit">Send</button>
          </form>
        </section>
      </aside>
    </main>

    <div id="selection-popover" class="selection-popover hidden">
      <div class="popover-actions">
        <button id="explain-selection-button" type="button">Explain</button>
        <button id="add-selection-highlight-button" type="button">Add highlight</button>
      </div>
      <form id="selection-highlight-form" class="selection-highlight-form hidden">
        <textarea
          id="highlight-text-input"
          rows="3"
          maxlength="900"
          aria-label="Highlight text"
        ></textarea>
        <select id="highlight-category-select" aria-label="Highlight category"></select>
        <input
          id="highlight-category-input"
          class="hidden"
          type="text"
          maxlength="40"
          placeholder="New category"
          aria-label="New highlight category"
        />
        <input
          id="highlight-color-input"
          class="hidden"
          type="color"
          value="#b6bec3"
          aria-label="Highlight color"
        />
        <button type="submit">Save</button>
      </form>
    </div>
    <div id="highlight-popover" class="highlight-popover hidden"></div>
    <div id="citation-popover" class="citation-popover hidden"></div>
    <div id="toast" class="toast hidden"></div>
    <script type="module" src="/static/theme.js?v=14"></script>
    <script type="module" src="/static/app.js?v=42"></script>
  </body>
</html>
